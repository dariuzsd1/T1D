name: CI

# Verifies the app type-checks and builds on every push / PR.
# (Added after Phase 0 — the local dev box had no Node toolchain, so this is
#  the authoritative green-check the audit roadmap promised.)

on:
  push:
  pull_request:

# Cancel superseded runs on the same branch to save free CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Pure type-check — env-independent, directly proves the Phase 0 fixes.
      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      # Full production build. Placeholder Supabase env vars keep module
      # evaluation from failing on the non-null `process.env.X!` reads.
      # These are throwaway CI values, NOT secrets.
      - name: Build (next build)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-only
